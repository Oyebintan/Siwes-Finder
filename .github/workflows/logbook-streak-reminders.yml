name: Logbook streak reminders

# Nudges students with an active placement who haven't logged any SIWES
# hours in a couple of days. The reminder logic (who's stale, who has a
# push token) all lives in the API route -- this workflow's only job is to
# hit it once a day, since Vercel's Hobby tier doesn't reliably offer free
# cron at this frequency.
#
# One-time setup (repo owner):
#   1. Add a GitHub Actions repository secret named CRON_SECRET (any long
#      random string -- `openssl rand -hex 32` works).
#   2. Set the same value as CRON_SECRET in the Vercel project's
#      environment variables (Production).

on:
  schedule:
    - cron: '17 8 * * *' # ~8:17 UTC daily -- off the hour on purpose
  workflow_dispatch: {}

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminder sweep
        run: |
          curl -sS -X POST "${{ vars.SITE_URL || 'https://siwes-finder-eight.vercel.app' }}/api/cron/logbook-streak-reminders" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --fail-with-body
