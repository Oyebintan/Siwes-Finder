name: Mobile OTA Update

# Publishes an EAS Update automatically whenever a merge to main touches
# mobile/ code. This covers every JS-only mobile change (screens, styling,
# animations, client logic -- nearly everything, per MOBILE_APP.md's OTA
# section) with zero manual `eas update` runs. It does NOT reach installs
# whose runtimeVersion (app.json's `version`) predates a native change --
# those still need a full `eas build` (see mobile-build-release.yml).
on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
  # Manual re-publish (Actions tab -> Run workflow). Needed when the fix
  # lives outside mobile/ (e.g. in this workflow itself), which the push
  # paths filter above would never trigger on.
  workflow_dispatch:

jobs:
  update:
    name: Publish EAS Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # Same Step 0 as mobile-build-release.yml. `eas update` bundles the
      # JS right here in CI, inlining EXPO_PUBLIC_API_URL at bundle time --
      # without this the bundle silently falls back to the emulator-only
      # default and every install that pulls the update loses server access
      # ("Could not reach the server").
      - name: Point the bundle at the deployed site
        working-directory: mobile
        run: echo "EXPO_PUBLIC_API_URL=https://siwes-finder-eight.vercel.app" > .env

      - name: Publish update to the production channel
        working-directory: mobile
        # The commit message goes through an env var, not inline ${{ }}
        # interpolation inside `run`, so quotes/backticks in a merge commit
        # can't break out of the shell command. Empty on workflow_dispatch,
        # hence the fallback.
        #
        # --channel (NOT --branch): installs request updates by CHANNEL
        # (baked into the binary as expo-channel-name), and the server only
        # serves what the channel's linked branch contains. `--branch`
        # publishes to the branch and silently does nothing for the channel
        # if the two were never linked -- which left every publish from this
        # workflow invisible to real installs. `--channel` targets the
        # channel directly and creates/repairs the branch link itself.
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message || 'Manual OTA re-publish' }}
        run: |
          eas update --channel production --non-interactive \
            --message "$COMMIT_MESSAGE"

      # Print the channel -> branch mapping so a broken link is visible in
      # the run log instead of failing silently on devices.
      - name: Show channel/branch mapping
        working-directory: mobile
        run: eas channel:view production --non-interactive || true
