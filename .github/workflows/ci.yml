name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Lint, typecheck, and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # A throwaway MongoDB for the seeded fixtures -- nothing here ever
    # touches the production database.
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGODB_URI: mongodb://localhost:27017/siwes-finder-e2e
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: e2e-only-not-a-real-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E suite
        run: npm run test:e2e

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  mobile:
    name: Mobile — lint and typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Only run when the push/PR actually touches mobile/ -- keeps this
      # job (and its separate npm install) from firing on every unrelated
      # web-only change.
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            mobile:
              - 'mobile/**'

      - uses: actions/setup-node@v4
        if: steps.changes.outputs.mobile == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        if: steps.changes.outputs.mobile == 'true'
        working-directory: mobile
        run: npm ci

      - name: Lint
        if: steps.changes.outputs.mobile == 'true'
        working-directory: mobile
        run: npm run lint

      - name: Typecheck
        if: steps.changes.outputs.mobile == 'true'
        working-directory: mobile
        run: npm run typecheck
