name: Mobile Native Build & Release

# Auto-builds a new Android APK and publishes it as a GitHub Release
# whenever a merge to main changes something that needs a real build
# rather than an OTA update (app.json, eas.json, or a dependency bump --
# see MOBILE_APP.md's "Cutting a new Android build"). The resulting APK
# still has to be downloaded and installed once per phone -- Android
# can't silently self-update a sideloaded app the way Play Store does --
# but nobody has to run `eas build` or touch a terminal to get there.
on:
  push:
    branches: [main]
    paths:
      - 'mobile/app.json'
      - 'mobile/eas.json'
      - 'mobile/package.json'
      - 'mobile/package-lock.json'
  # Manual re-cut (Actions tab -> Run workflow). Needed to force a fresh
  # native build without an app.json/eas.json/package.json change -- e.g.
  # to rule out an OTA runtime-version mismatch (eas.json's
  # appVersionSource: "remote" means the *actual* version baked into a
  # build is resolved on EAS's servers and can drift from this file's
  # static "version" over successive auto-incremented builds, silently
  # making later `eas update` publishes incompatible with an older
  # install -- a fresh build guarantees a matching runtimeVersion).
  workflow_dispatch:
    inputs:
      reuse_latest:
        description: 'Publish the most recent FINISHED EAS build instead of compiling a new one (no build quota used)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    # Hard ceiling: the poll loop below already caps the EAS wait at 40
    # minutes, so anything past this is a genuinely hung runner.
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        working-directory: mobile
        run: npm ci

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # The API URL is carried by eas.json's production profile `env`, NOT
      # a .env file: eas build uploads the project to EAS's servers
      # respecting .gitignore, and the root .gitignore excludes .env* -- so
      # a CI-written .env silently never reached the build machine and
      # every EAS-compiled APK shipped with the emulator-only fallback URL
      # ("Could not reach the server" on real devices). eas.json is
      # committed, so it always arrives.

      # `eas build --wait` hung indefinitely twice even after the EAS-side
      # build had FINISHED (runs #1 and #2 of this workflow), so waiting is
      # done with an explicit bounded poll instead. reuse_latest skips the
      # compile entirely and re-publishes the newest finished build --
      # useful when a build succeeded on EAS but this workflow's release
      # half never ran.
      - name: Build the Android APK
        working-directory: mobile
        run: |
          if [ "${{ inputs.reuse_latest }}" = "true" ]; then
            echo "Reusing the most recent finished EAS build (no new compile)."
            eas build:list --platform android --status finished --limit 1 --non-interactive --json > build-result.json
            exit 0
          fi

          eas build --platform android --profile production --non-interactive --no-wait --json > build-start.json
          BUILD_ID=$(jq -r 'if type == "array" then .[0].id else .id end // empty' build-start.json)
          if [ -z "$BUILD_ID" ]; then
            echo "::error::Could not read a build id from EAS's output."
            cat build-start.json
            exit 1
          fi

          echo "Waiting for EAS build $BUILD_ID (checking every 30s, 40 min cap)..."
          for i in $(seq 1 80); do
            sleep 30
            eas build:view "$BUILD_ID" --json > build-result.json || continue
            STATUS=$(jq -r '.status // empty' build-result.json)
            echo "[$i/80] status: $STATUS"
            case "$STATUS" in
              FINISHED) exit 0 ;;
              ERRORED|CANCELED) echo "::error::EAS build ended as $STATUS."; exit 1 ;;
            esac
          done
          echo "::error::Timed out waiting for the EAS build after 40 minutes."
          exit 1

      - name: Extract the build artifact URL
        id: build
        working-directory: mobile
        run: |
          # build-result.json is an array from build:list, an object from
          # build:view -- accept either shape.
          URL=$(jq -r 'if type == "array" then .[0].artifacts.buildUrl else .artifacts.buildUrl end // empty' build-result.json)
          if [ -z "$URL" ]; then
            echo "::error::Could not find a build artifact URL in EAS's output."
            cat build-result.json
            exit 1
          fi
          echo "apk_url=$URL" >> "$GITHUB_OUTPUT"

      - name: Download the APK
        working-directory: mobile
        run: curl -fL -o app-release.apk "${{ steps.build.outputs.apk_url }}"

      - name: Determine the release tag
        id: tag
        working-directory: mobile
        run: |
          VERSION=$(jq -r '.expo.version' app.json)
          echo "tag=v${VERSION}-android-ci${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "SIWES Finder Android ${{ steps.tag.outputs.tag }}"
          body: |
            Automated build from ${{ github.sha }}.

            ${{ github.event.head_commit.message }}
          files: mobile/app-release.apk

      - name: Point the website's download link at the new release
        run: |
          NEW_URL="https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/app-release.apk"
          sed -i "s#'https://github.com/${{ github.repository }}/releases/download/[^']*'#'${NEW_URL}'#" src/app/page.tsx

      - name: Commit and push the updated download link
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/page.tsx
          git commit -m "chore(mobile): point Android download link at ${{ steps.tag.outputs.tag }} [skip ci]"
          git push
